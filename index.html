<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Microtareas</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

body{
font-family: Arial;
background:#f2f2f2;
text-align:center;
margin:0;
}

h2{
background:#2AABEE;
color:white;
padding:15px;
margin:0;
}

.stats{
background:white;
padding:10px;
margin:10px;
border-radius:10px;
}

.card{
background:white;
margin:15px;
padding:15px;
border-radius:10px;
}

.logo{
width:60px;
}

button{
background:#2AABEE;
color:white;
padding:10px;
border:none;
border-radius:6px;
}

.footer{
margin:20px;
color:#555;
}

</style>

</head>

<body>

<h2>💰 Microtareas</h2>

<div class="stats">

👥 Usuarios: <span id="users"></span>  
<br>
✅ Tareas completadas: <span id="tasks"></span>

</div>

<div class="card">

<img class="logo" src="https://freecash.com/favicon.ico">

<h3>Freecash</h3>

<p>Encuestas y juegos.</p>

<a href="https://freecash.com/r/2H1Z3O" target="_blank">

<button onclick="task()">Ir a la tarea</button>

</a>

</div>

<div class="card">

<img class="logo" src="https://www.ysense.com/favicon.ico">

<h3>ySense</h3>

<p>Completa encuestas.</p>

<a href="https://www.ysense.com/?rb=140200330" target="_blank">

<button onclick="task()">Ir a la tarea</button>

</a>

</div>

<div class="card">

<img class="logo" src="https://grabpoints.com/favicon.ico">

<h3>GrabPoints</h3>

<p>Ofertas y encuestas.</p>

<a href="https://grabpoints.com?ref=QN4JET" target="_blank">

<button onclick="task()">Ir a la tarea</button>

</a>

</div>

<div class="card">

<img class="logo" src="https://www.clickworker.com/favicon.ico">

<h3>Clickworker</h3>

<p>Microtareas pagadas.</p>

<a href="https://clickworker.app/Pe034p" target="_blank">

<button onclick="task()">Ir a la tarea</button>

</a>

</div>

<div class="footer">

📢 Comparte este bot con tus amigos.

</div>

<script>

let users = Math.floor(Math.random()*500)+800;
let tasks = Math.floor(Math.random()*3000)+2000;

document.getElementById("users").innerText = users;
document.getElementById("tasks").innerText = tasks;

function task(){
tasks++;
document.getElementById("tasks").innerText = tasks;
}

</script>

</body>

</html>
